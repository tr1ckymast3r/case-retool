services:
  app:
    build: ./app
    ports:
      - "3010:3010"
    volumes:
      - shared-data:/data
      - retool-uploads:/app/uploads
      - retool-reports:/app/reports
      - retool-db:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/retool.db
      - WORKER_DATA_DIR=/data
      - PYTHONUNBUFFERED=1
    depends_on:
      - worker
    restart: unless-stopped

  worker:
    build: ./worker
    volumes:
      - shared-data:/data
    privileged: true
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined
    restart: unless-stopped

volumes:
  shared-data:
  retool-uploads:
  retool-reports:
  retool-db:
